<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ADECON 2026 – Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

 img.full-width {
  width: 100%;
  max-height: 200px;
  object-fit:fill;
  object-position: center;
  display: block;
}

 img.footer {
  width: 100%;
  max-height: 150px;
  object-fit: fill;
  display: block;
  margin: 0 auto;
}
    img.header-img { max-width: 600px; width: 80%; display: block; margin: 20px auto; }
    img.header-img { max-height: 280px; width: 100%; object-fit: cover; object-position: center top; }

    .cards-section {
      padding: 40px 20px;
      text-align: center;
    }

    h2 {
      font-size: 1.6rem;
      margin-bottom: 30px;
      color: #1a2e6e;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 30px 24px;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 1rem;
      color: #1a2e6e;
      margin-bottom: 8px;
    }

    .card .note {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 12px;
      min-height: 18px;
    }

    .card .price {
      font-size: 1.6rem;
      font-weight: bold;
      color: #e8621a;
    }

    .card a {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 20px;
      background: #1a2e6e;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <img class="full-width" src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/header.png"/>

  <div class="cards-section">
    
<div style="text-align:center; margin: 20px 0 10px; font-family: Arial, sans-serif;">
  <h1 style="font-size: 2em; font-weight: 800; color: #1a237e; margin: 0 0 4px;">ADECON 2026</h1>
  <h2 style="font-size: 1.2em; font-weight: 600; color: #333; margin: 0 0 6px;">11th ADE Annual National Conference</h2>
  <p style="font-size: 1em; color: #555; margin: 0;">28-29th February 2026 | Virtual</p>
</div>
<h2>Register Now</h2>
    <div class="cards">

      <div class="card">
        <h3>ADE / NSI Members</h3>
        <div class="note"></div>
        <div class="price">Rs. 600</div>
        <a href="https://www.onference.in/c/adecon-2026-member/6794" target="_blank">Register</a>
      </div>

      <div class="card">
        <h3>Non-member</h3>
        <div class="note"></div>
        <div class="price">Rs. 800</div>
        <a href="https://www.onference.in/c/adecon-2026-non-member/6795" target="_blank">Register</a>
      </div>

      <div class="card">
        <h3>Students</h3>
        <div class="note">Current college ID card mandatory</div>
        <div class="price">Rs. 350</div>
        <a href="https://www.onference.in/c/adecon-2026-student/6796" target="_blank">Register</a>
      </div>

      <div class="card">
        <h3>Corporates / Doctors</h3>
        <div class="note"></div>
        <div class="price">Rs. 1000</div>
        <a href="https://www.onference.in/c/adecon-2026-corporatesundefineddoctors/6797" target="_blank">Register</a>
      </div>

    </div>
  </div>

  <img class="footer" src="https://s3.ap-south-1.amazonaws.com/cdn2.onference.in/testepisodethumbnail/footer.png"/>

</body>
</html>
